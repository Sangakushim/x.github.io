
<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>书签管理器</title>
<style>:root{--bg:#f5f6f8;--surface:#fff;--text:#1a1a2e;--text2:#6b6f8a;--text3:#9ca1b7;--border:#e4e6eb;--border2:#d0d3dd;--primary:#4a6cf7;--primary-h:#3b5de7;--danger:#e34f4f;--danger-bg:#fef0f0;--hover:#f5f6f8;--active:#eef1fe;--tag:#eef0f6;--tag-h:#dfe2ee;--tag-t:#4a4d67;--chip:#f5f6f8;--chip-h:#edeff5;--modal:rgba(0,0,0,.3);--input:#fafafa;--input-f:#fff;--lock-bg:#f5f6f8;--scroll:#d0d3dd;--fs:14px}
[data-theme=dark]{--bg:#13142a;--surface:#1e1f3a;--text:#e4e6eb;--text2:#9ca1b7;--text3:#6b6f8a;--border:#2d2f4a;--border2:#3a3c58;--primary:#6b8aff;--primary-h:#5a7af0;--danger:#f06a6a;--danger-bg:#3a1e28;--hover:#262842;--active:#1a1c36;--tag:#2d2f4a;--tag-h:#3a3c58;--tag-t:#c4c6d8;--chip:#262842;--chip-h:#2d2f4a;--modal:rgba(0,0,0,.55);--input:#262842;--input-f:#2d2f4a;--lock-bg:#13142a;--scroll:#3a3c58}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:var(--fs)}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--scroll);border-radius:3px}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
header h1{font-size:1.15rem;font-weight:600}
.hdr-right{display:flex;align-items:center;gap:.6rem}
.hdr-right .stats{font-size:.85rem;color:var(--text2)}
.hdr-right .stats span{font-weight:600;color:var(--text)}
.hdr-btn{background:none;border:none;font-size:1.1rem;cursor:pointer;padding:.15rem .3rem;border-radius:4px;line-height:1;transition:background .12s;color:var(--text2)}
.hdr-btn:hover{background:var(--hover);color:var(--text)}
.auto-lock-indicator{font-size:.72rem;color:var(--text3);margin-left:.1rem;display:none}
.hdr-right.unlocked .auto-lock-indicator{display:inline}
.layout{display:flex;flex:1;min-height:0}
.sidebar{width:200px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);padding:.75rem 0;overflow-y:auto;display:flex;flex-direction:column}
.sidebar-title{font-size:.75rem;font-weight:600;color:var(--text3);padding:0 1rem .4rem;letter-spacing:.04em;text-transform:uppercase}
.group-item,.tag-sb-item{display:flex;align-items:center;justify-content:space-between;padding:.35rem 1rem;cursor:pointer;font-size:.85rem;color:var(--text);border-left:3px solid transparent;transition:background .1s}
.group-item:hover,.tag-sb-item:hover{background:var(--hover)}
.group-item.active,.tag-sb-item.active{background:var(--active);border-left-color:var(--primary);font-weight:600}
.group-item .gname{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.group-item .gcount,.tag-sb-item .tcount{font-size:.73rem;color:var(--text3);margin-left:.4rem;flex-shrink:0}
.group-actions{display:none;align-items:center;gap:.1rem;flex-shrink:0;margin-left:.2rem}
.group-item:hover .group-actions{display:flex}
.group-actions button{background:none;border:none;cursor:pointer;font-size:.7rem;color:var(--text3);padding:.1rem .2rem;border-radius:3px;line-height:1}
.group-actions button:hover{color:var(--text);background:var(--hover)}
.group-actions .del-group:hover{color:var(--danger)}
.sidebar-divider{height:1px;background:var(--border);margin:.4rem 1rem}
.add-group-btn{margin:.2rem .75rem;padding:.35rem .7rem;border:1px dashed var(--border2);border-radius:6px;background:transparent;font-size:.8rem;color:var(--text2);cursor:pointer;transition:all .12s;text-align:left}
.add-group-btn:hover{border-color:var(--primary);color:var(--primary);background:var(--active)}
.main-area{flex:1;max-width:100%;padding:1.25rem 1.5rem 3rem;overflow-y:auto}
.add-card{background:var(--surface);border-radius:8px;padding:1.1rem 1.25rem;box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:1rem;max-width:780px}
.add-card h2{font-size:.95rem;font-weight:600;margin-bottom:.8rem}
.form-row{display:flex;gap:.6rem;flex-wrap:wrap;align-items:flex-start}
.form-row input,.form-row select,.form-row textarea{flex:1 1 160px;padding:.5rem .65rem;border:1px solid var(--border2);border-radius:6px;font-size:.875rem;background:var(--input);outline:none;transition:border-color .15s,box-shadow .15s;color:var(--text)}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:var(--primary);box-shadow:0 0 0 2px rgba(74,108,247,.12);background:var(--input-f)}
.form-row textarea{min-height:2.5rem;resize:vertical;font-family:inherit}
.form-row select{cursor:pointer}
.btn{padding:.5rem .9rem;border:none;border-radius:6px;font-size:.875rem;font-weight:500;cursor:pointer;transition:background .15s,transform .1s;white-space:nowrap}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-h)}
.btn-danger{background:transparent;color:var(--danger);padding:.25rem .4rem;font-size:.8rem}
.btn-danger:hover{background:var(--danger-bg)}
.btn-ghost{background:transparent;color:var(--text2);padding:.25rem .35rem;font-size:.8rem;line-height:1}
.btn-ghost:hover{background:var(--hover);color:var(--text)}
.btn-cancel{background:var(--hover);color:var(--text)}
.btn-cancel:hover{background:var(--chip-h)}
.filter-bar{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1rem;align-items:center;max-width:780px}
.filter-bar input{flex:1 1 180px;padding:.45rem .65rem;border:1px solid var(--border2);border-radius:6px;font-size:.85rem;background:var(--surface);outline:none;transition:border-color .15s;color:var(--text)}
.filter-bar input:focus{border-color:var(--primary)}
.tag-filter-group{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.tag-chip{display:inline-flex;align-items:center;gap:.2rem;padding:.2rem .5rem;border-radius:100px;font-size:.76rem;cursor:pointer;border:1px solid var(--border2);background:var(--chip);color:var(--text);transition:all .12s;user-select:none}
.tag-chip.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.tag-chip:hover:not(.active){border-color:var(--text3);background:var(--chip-h)}
.filter-clear{font-size:.78rem;color:var(--text2);cursor:pointer;text-decoration:underline dotted;padding:.15rem .3rem}
.filter-clear:hover{color:var(--text)}
.bookmark-list{display:flex;flex-direction:column;gap:.5rem;max-width:780px}
.empty-state{text-align:center;padding:3rem 1rem;color:var(--text3);font-size:.9rem}
.bookmark-item{background:var(--surface);border-radius:8px;padding:.75rem 1rem;box-shadow:0 1px 3px rgba(0,0,0,.04);display:flex;align-items:flex-start;gap:.65rem;transition:box-shadow .12s}
.bookmark-item:hover{box-shadow:0 1px 6px rgba(0,0,0,.08)}
.bookmark-icon{flex-shrink:0;width:28px;height:28px;border-radius:6px;background:var(--chip);display:flex;align-items:center;justify-content:center;font-size:1rem;color:var(--text2);overflow:hidden}
.bookmark-icon img{width:100%;height:100%;object-fit:cover;border-radius:6px}
.bookmark-body{flex:1;min-width:0}
.bookmark-title{font-weight:600;font-size:.88rem;color:var(--text);text-decoration:none;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bookmark-title:hover{color:var(--primary)}
.bookmark-url{font-size:.76rem;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:.1rem}
.bookmark-desc{font-size:.78rem;color:var(--text2);line-height:1.4;margin-top:.25rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.bookmark-tags{display:flex;flex-wrap:wrap;gap:.25rem;margin-top:.35rem}
.bookmark-tag{display:inline-block;padding:.12rem .4rem;border-radius:100px;font-size:.7rem;background:var(--tag);color:var(--tag-t);cursor:pointer;transition:background .1s}
.bookmark-tag:hover{background:var(--tag-h)}
.bookmark-actions{flex-shrink:0;display:flex;gap:.15rem;margin-top:.05rem}
.modal-overlay{position:fixed;inset:0;background:var(--modal);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .15s}
.modal-overlay.open{opacity:1;pointer-events:auto}
.modal-box{background:var(--surface);border-radius:10px;width:480px;max-width:92vw;padding:1.4rem 1.5rem;box-shadow:0 8px 30px rgba(0,0,0,.12)}
.modal-box h2{font-size:1rem;font-weight:600;margin-bottom:.85rem}
.modal-field{margin-bottom:.75rem}
.modal-field label{display:block;font-size:.78rem;color:var(--text2);margin-bottom:.2rem;font-weight:500}
.modal-field input,.modal-field select,.modal-field textarea{width:100%;padding:.45rem .6rem;border:1px solid var(--border2);border-radius:6px;font-size:.875rem;background:var(--input);outline:none;font-family:inherit;color:var(--text)}
.modal-field input:focus,.modal-field select:focus,.modal-field textarea:focus{border-color:var(--primary);box-shadow:0 0 0 2px rgba(74,108,247,.12);background:var(--input-f)}
.modal-field textarea{min-height:3.5rem;resize:vertical}
.modal-actions{display:flex;justify-content:flex-end;gap:.5rem;margin-top:.2rem}
.set-group{margin-bottom:1rem}
.set-group label{display:block;font-size:.78rem;color:var(--text2);margin-bottom:.4rem;font-weight:500}
.set-options{display:flex;gap:.4rem;flex-wrap:wrap}
.set-opt{padding:.35rem .7rem;border:1px solid var(--border2);border-radius:6px;background:var(--chip);font-size:.82rem;cursor:pointer;color:var(--text);transition:all .12s;user-select:none}
.set-opt:hover{border-color:var(--text3);background:var(--chip-h)}
.set-opt.active{border-color:var(--primary);background:var(--primary);color:#fff}
.lock-screen{position:fixed;inset:0;z-index:200;background:var(--lock-bg);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
.lock-screen.open{opacity:1;pointer-events:auto}
.lock-box{background:var(--surface);border-radius:12px;padding:2.2rem 2rem;width:360px;max-width:90vw;box-shadow:0 8px 40px rgba(0,0,0,.1);text-align:center}
.lock-box .lock-icon{font-size:2.2rem;margin-bottom:.5rem}
.lock-box h2{font-size:1.1rem;font-weight:600;margin-bottom:.3rem}
.lock-box .lock-sub{font-size:.85rem;color:var(--text2);margin-bottom:1.2rem}
.lock-box input[type=password]{width:100%;padding:.6rem .7rem;border:1px solid var(--border2);border-radius:8px;font-size:1rem;background:var(--input);outline:none;text-align:center;transition:border-color .15s;color:var(--text)}
.lock-box input[type=password]:focus{border-color:var(--primary);background:var(--input-f)}
.lock-box .lock-error{font-size:.8rem;color:var(--danger);margin-top:.5rem;min-height:1.2rem}
.lock-box .lock-btn{width:100%;margin-top:.75rem;padding:.6rem;border:none;border-radius:8px;font-size:.9rem;font-weight:500;background:var(--primary);color:#fff;cursor:pointer;transition:background .15s}
.lock-box .lock-btn:hover{background:var(--primary-h)}
.lock-box .lock-set-link{display:inline-block;margin-top:.8rem;font-size:.78rem;color:var(--text3);cursor:pointer;text-decoration:underline dotted}
.lock-box .lock-set-link:hover{color:var(--text2)}
@media(max-width:680px){.sidebar{width:160px}.main-area{padding:1rem}.form-row input,.form-row select{flex:1 1 100%}}
</style></head><body><header><h1>&#x1F4D1; 书签管理器</h1>
<div class="hdr-right" id="hdrRight">
<span class="stats">共 <span id="totalCount">0</span> 个书签</span>
<span class="auto-lock-indicator" id="lockIndicator"></span>
<button class="hdr-btn" id="settingsBtn" title="设置">&#x2699;</button>
<button class="hdr-btn" id="lockToggle" title="锁定">&#x1F513;</button>
</div></header>
<div class="layout" id="appLayout">
<aside class="sidebar">
<div class="sidebar-title">分组</div><div id="groupList"></div>
<div class="sidebar-divider"></div>
<button class="add-group-btn" id="addGroupBtn">+ 新建分组</button>
<div class="sidebar-divider"></div>
<div class="sidebar-title">标签</div>
<div id="tagSidebarList"></div>
</aside>
<main class="main-area">
<div class="add-card">
<h2>添加书签</h2>
<div class="form-row">
<input type="text" id="inputTitle" placeholder="标题" autocomplete="off">
<input type="url" id="inputUrl" placeholder="URL (https://...)" autocomplete="off">
<input type="text" id="inputTags" placeholder="标签，用 # 分隔" autocomplete="off">
<select id="inputGroup"></select>
<textarea id="inputDesc" placeholder="简短描述这个网站..." rows="1"></textarea>
<button class="btn btn-primary" id="btnAdd">添加</button>
</div></div>
<div class="filter-bar">
<input type="text" id="searchInput" placeholder="搜索..." autocomplete="off">
<div class="tag-filter-group" id="tagFilterGroup"></div>
<span class="filter-clear" id="clearFilter">清除筛选</span>
</div>
<div class="bookmark-list" id="bookmarkList"></div>
</main></div>
<div class="modal-overlay" id="editModal">
<div class="modal-box">
<h2>编辑书签</h2>
<div class="modal-field"><label>标题</label><input type="text" id="editTitle"></div>
<div class="modal-field"><label>URL</label><input type="url" id="editUrl"></div>
<div class="modal-field"><label>标签（用 # 分隔）</label><input type="text" id="editTags"></div>
<div class="modal-field"><label>分组</label><select id="editGroup"></select></div>
<div class="modal-field"><label>描述</label><textarea id="editDesc" rows="2"></textarea></div>
<div class="modal-actions">
<button class="btn btn-cancel" id="editCancel">取消</button>
<button class="btn btn-primary" id="editSave">保存</button>
</div></div></div>
<div class="modal-overlay" id="pwModal">
<div class="modal-box">
<h2 id="pwModalTitle">设置密码</h2>
<div class="modal-field" id="pwOldField"><label>当前密码</label><input type="password" id="pwOld"></div>
<div class="modal-field"><label>新密码</label><input type="password" id="pwNew"></div>
<div class="modal-field"><label>确认新密码</label><input type="password" id="pwConfirm"></div>
<div style="font-size:.78rem;color:var(--text3);margin-bottom:.75rem" id="pwHint"></div>
<div class="modal-actions">
<button class="btn btn-cancel" id="pwCancel">取消</button>
<button class="btn btn-primary" id="pwSave">保存密码</button>
</div></div></div>
<div class="modal-overlay" id="settingsModal">
<div class="modal-box">
<h2>&#x2699; 设置</h2>
<div class="set-group"><label>主题</label><div class="set-options" id="themeOptions"><div class="set-opt" data-val="light">&#x2600; 浅色</div><div class="set-opt" data-val="dark">&#x1F319; 深色</div></div></div>
<div class="set-group"><label>字号</label><div class="set-options" id="fsOptions"><div class="set-opt" data-val="12">12</div><div class="set-opt" data-val="13">13</div><div class="set-opt" data-val="14">14</div><div class="set-opt" data-val="15">15</div><div class="set-opt" data-val="16">16</div><div class="set-opt" data-val="18">18</div><div class="set-opt" data-val="20">20</div></div></div>
<div class="modal-actions"><button class="btn btn-cancel" id="settingsClose">关闭</button></div>
</div></div>
<div class="lock-screen" id="lockScreen">
<div class="lock-box">
<div class="lock-icon">&#x1F512;</div>
<h2>已锁定</h2>
<p class="lock-sub">输入密码解锁书签管理器</p>
<input type="password" id="lockPw" placeholder="输入密码" autocomplete="off">
<div class="lock-error" id="lockError"></div>
<button class="lock-btn" id="lockUnlock">解锁</button>
<span class="lock-set-link" id="lockShowSet">设置密码</span>
</div></div>
<script>
const SK={bookmarks:'codex_bookmarks',groups:'codex_groups',lockHash:'codex_lock_hash',theme:'codex_theme',fontSize:'codex_fontsize'};
const AL=300000;let B=[],G=[],aT=null,sT='',aG='__all__',eId=null,uL=false,aTO=null;const $=id=>document.getElementById(id);
function ld(){try{B=JSON.parse(localStorage.getItem(SK.bookmarks))||[]}catch{B=[]}try{G=JSON.parse(localStorage.getItem(SK.groups))||[]}catch{G=[]}if(!G.includes('默认'))G.unshift('默认')}
function sv(){localStorage.setItem(SK.bookmarks,JSON.stringify(B));localStorage.setItem(SK.groups,JSON.stringify(G))}
function lS(){let t=localStorage.getItem(SK.theme)||'light',f=localStorage.getItem(SK.fontSize)||'14';document.body.setAttribute('data-theme',t);document.documentElement.style.setProperty('--fs',f+'px');document.querySelectorAll('#themeOptions .set-opt').forEach(e=>e.classList.toggle('active',e.dataset.val===t));document.querySelectorAll('#fsOptions .set-opt').forEach(e=>e.classList.toggle('active',e.dataset.val===f))}
function sTv(v){localStorage.setItem(SK.theme,v);document.body.setAttribute('data-theme',v);document.querySelectorAll('#themeOptions .set-opt').forEach(e=>e.classList.toggle('active',e.dataset.val===v))}
function sFv(v){localStorage.setItem(SK.fontSize,v);document.documentElement.style.setProperty('--fs',v+'px');document.querySelectorAll('#fsOptions .set-opt').forEach(e=>e.classList.toggle('active',e.dataset.val===v))}
async function hPW(pw){let e=new TextEncoder().encode(pw),b=await crypto.subtle.digest('SHA-256',e);return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('')}
function gSH(){try{return localStorage.getItem(SK.lockHash)||''}catch{return ''}}
function sSH(h){try{if(h)localStorage.setItem(SK.lockHash,h);else localStorage.removeItem(SK.lockHash)}catch{}}
async function tU(pw){if(await hPW(pw)===gSH()){uL=true;$('lockScreen').classList.remove('open');$('lockToggle').textContent='\u{1F512}';sAL();r();return true}return false}
function lk(){uL=false;cAL();$('lockToggle').textContent='\u{1F513}';$('lockScreen').classList.add('open');$('lockPw').value='';$('lockError').textContent=''}
async function iL(){let h=gSH();if(!h){uL=true;$('lockToggle').textContent='\u{1F512}';return}lk();$('lockPw').focus()}
function sAL(){clearTimeout(aTO);if(uL&&gSH()){aTO=setTimeout(()=>{if(uL)lk()},AL)}}
function cAL(){clearTimeout(aTO);$('lockIndicator').textContent='';$('hdrRight').classList.remove('unlocked')}
function rA(){if(uL&&gSH()){clearTimeout(aTO);aTO=setTimeout(()=>{if(uL)lk()},AL)}}
setInterval(()=>{if(uL&&gSH()&&aTO){let s=aTO._idleStart||0,r=Math.max(0,Math.round((AL-(Date.now()-s))/1000));$('lockIndicator').textContent=r>60?Math.floor(r/60)+'m':r+'s'}},1000)
function oPS(){let h=gSH();$('pwOldField').style.display=h?'block':'none';$('pwModalTitle').textContent=h?'修改密码':'设置密码';$('pwHint').textContent=h?'留空新密码并保存可清除密码':'设置一个密码来保护你的书签';$('pwOld').value='';$('pwNew').value='';$('pwConfirm').value='';$('pwModal').classList.add('open')}
async function sPS(){let h=gSH();if(h){let o=$('pwOld').value;if(!o)return alert('请输入当前密码');if((await hPW(o))!==h)return alert('当前密码错误')}let n=$('pwNew').value,c=$('pwConfirm').value;if(n||c){if(n!==c)return alert('两次密码不一致');if(n.length<4)return alert('密码至少 4 位')}let nh=n?await hPW(n):'';sSH(nh);$('pwModal').classList.remove('open');if(nh)alert('密码已'+(h?'修改':'设置'));else alert('密码已清除');if(!nh&&!uL)uL=true;if(!nh){$('lockScreen').classList.remove('open');$('lockToggle').textContent='\u{1F512}';cAL();r()}else if(uL){sAL()}}
function cPS(){$('pwModal').classList.remove('open')}
function pT(s){return s.split('#').map(t=>t.trim()).filter(t=>t.length)}
function aB(){let t=$('inputTitle').value.trim(),u=$('inputUrl').value.trim(),g=$('inputGroup').value,ts=pT($('inputTags').value),d=$('inputDesc').value.trim();if(!t)return alert('请输入标题');if(!u)return alert('请输入 URL');if(!/^https?:\/\//i.test(u))u='https://'+u;if(g&&!G.includes(g))G.push(g);B.push({id:Date.now().toString(36)+Math.random().toString(36).slice(2,6),title:t,url:u,tags:ts,group:g,desc:d,createdAt:Date.now()});sv();$('inputTitle').value='';$('inputUrl').value='';$('inputTags').value='';$('inputDesc').value='';$('inputTitle').focus();aG=g||'__all__';r()}
function oE(id){let b=B.find(x=>x.id===id);if(!b)return;eId=id;$('editTitle').value=b.title;$('editUrl').value=b.url;$('editTags').value=b.tags.join(' # ');$('editDesc').value=b.desc||'';let s=$('editGroup');s.innerHTML='';G.forEach(g=>{let o=document.createElement('option');o.value=g;o.textContent=g;if(g===b.group)o.selected=true;s.appendChild(o)});$('editModal').classList.add('open')}
