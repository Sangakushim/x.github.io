<input type="text" id="searchInput" placeholder="搜索标题、描述、URL 或标签…" autocomplete="off">
<div class="tag-filter-group" id="tagFilterGroup"></div>
<span class="filter-clear" id="clearFilter">清除筛选</span>
</div>
<div class="bookmark-list" id="bookmarkList"></div>
</main>
</div>
<div class="modal-overlay" id="editModal">
<div class="modal-box">
<h2>编辑书签</h2>
<div class="modal-field"><label>标题</label><input type="text" id="editTitle"></div>
<div class="modal-field"><label>URL</label><input type="url" id="editUrl"></div>
<div class="modal-field"><label>标签（用 # 分隔）</label><input type="text" id="editTags"></div>
<div class="modal-field"><label>分组</label><select id="editGroup"></select></div>
<div class="modal-field"><label>描述</label><textarea id="editDesc" rows="2"></textarea></div>
<div class="modal-actions">
<button class="btn btn-cancel" id="editCancel">取消</button>
<button class="btn btn-primary" id="editSave">保存</button>
</div>
</div>
</div>
<div class="modal-overlay" id="pwModal">
<div class="modal-box">
<h2 id="pwModalTitle">设置密码</h2>
<div class="modal-field" id="pwOldField"><label>当前密码</label><input type="password" id="pwOld"></div>
<div class="modal-field"><label>新密码</label><input type="password" id="pwNew"></div>
<div class="modal-field"><label>确认新密码</label><input type="password" id="pwConfirm"></div>
<div style="font-size:.78rem;color:var(--text3);margin-bottom:.75rem" id="pwHint"></div>
<div class="modal-actions">
<button class="btn btn-cancel" id="pwCancel">取消</button>
<button class="btn btn-primary" id="pwSave">保存密码</button>
</div>
</div>
</div>
<div class="modal-overlay" id="settingsModal">
<div class="modal-box">
<h2>⚙️ 设置</h2>
<div class="set-group"><label>主题</label><div class="set-options" id="themeOptions"><div class="set-opt" data-val="light">☀️ 浅色</div><div class="set-opt" data-val="dark">🌙 深色</div></div></div>
<div class="set-group"><label>字号</label><div class="set-options" id="fsOptions"><div class="set-opt" data-val="13">A- 小</div><div class="set-opt" data-val="14">A 中</div><div class="set-opt" data-val="16">A+ 大</div></div></div>
<div class="modal-actions"><button class="btn btn-cancel" id="settingsClose">关闭</button></div>
</div>
</div>
<div class="lock-screen" id="lockScreen">
<div class="lock-box">
<div class="lock-icon">🔒</div>
<h2>已锁定</h2>
<p class="lock-sub">输入密码解锁书签管理器</p>
<input type="password" id="lockPw" placeholder="输入密码" autocomplete="off">
<div class="lock-error" id="lockError"></div>
<button class="lock-btn" id="lockUnlock">解锁</button>
<span class="lock-set-link" id="lockShowSet">设置密码</span>
</div>
</div>
<script>
const SK='codex_bookmarks',GK='codex_groups',HK='codex_lock_hash',TK='codex_theme',FK='codex_fontsize';
let B=[],G=[],activeTag=null,searchText='',activeGroup='__all__',editingId=null,unlocked=false,autoLockTO=null;
const AUTO_LOCK_MS=300000;
/* --- Theme & font size --- */
function loadTheme(){let t=localStorage.getItem(TK)||'light',f=localStorage.getItem(FK)||'14';document.body.setAttribute('data-theme',t);document.documentElement.style.setProperty('--fs',f+'px');document.querySelectorAll('#themeOptions .set-opt').forEach(el=>el.classList.toggle('active',el.dataset.val===t));document.querySelectorAll('#fsOptions .set-opt').forEach(el=>el.classList.toggle('active',el.dataset.val===f))}
function setTheme(v){localStorage.setItem(TK,v);document.body.setAttribute('data-theme',v);document.querySelectorAll('#themeOptions .set-opt').forEach(el=>el.classList.toggle('active',el.dataset.val===v))}
function setFontSize(v){localStorage.setItem(FK,v);document.documentElement.style.setProperty('--fs',v+'px');document.querySelectorAll('#fsOptions .set-opt').forEach(el=>el.classList.toggle('active',el.dataset.val===v))}
/* --- Settings modal --- */
function openSettings(){loadTheme();Q('settingsModal').classList.add('open')}
function closeSettings(){Q('settingsModal').classList.remove('open')}
/* --- Password hash --- */
async function hashPW(pw){let enc=new TextEncoder().encode(pw),buf=await crypto.subtle.digest('SHA-256',enc);return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('')}
function getStoredHash(){try{return localStorage.getItem(HK)||''}catch{return ''}}
function setStoredHash(h){try{if(h)localStorage.setItem(HK,h);else localStorage.removeItem(HK)}catch{}}
/* --- Auto-lock --- */
function startAutoLock(){clearTimeout(autoLockTO);if(unlocked&&getStoredHash()){autoLockTO=setTimeout(()=>{if(unlocked)lock()},AUTO_LOCK_MS);updateLockIndicator()}}
function stopAutoLock(){clearTimeout(autoLockTO);Q('lockIndicator').textContent='';Q('hdrRight').classList.remove('unlocked')}
function resetActivity(){if(unlocked&&getStoredHash()){clearTimeout(autoLockTO);autoLockTO=setTimeout(()=>{if(unlocked)lock()},AUTO_LOCK_MS);updateLockIndicator()}}
function updateLockIndicator(){if(!unlocked||!getStoredHash()){Q('lockIndicator').textContent='';return}Q('hdrRight').classList.add('unlocked')}
setInterval(()=>{if(unlocked&&getStoredHash()&&autoLockTO){let el=autoLockTO._idleStart||0;let rem=Math.max(0,Math.round((AUTO_LOCK_MS-(Date.now()-el))/1000));if(rem>60)Q('lockIndicator').textContent=Math.floor(rem/60)+'m';else Q('lockIndicator').textContent=rem+'s'}},1000)
/* --- Lock / unlock --- */
async function tryUnlock(pw){let h=await hashPW(pw);if(h===getStoredHash()){unlocked=true;Q('lockScreen').classList.remove('open');Q('lockToggle').textContent='🔒';startAutoLock();render();return true}return false}
function lock(){unlocked=false;stopAutoLock();Q('lockToggle').textContent='🔓';Q('lockScreen').classList.add('open');Q('lockPw').value='';Q('lockError').textContent=''}
async function initLock(){let h=getStoredHash();if(!h){unlocked=true;Q('lockToggle').textContent='🔒';return}lock();Q('lockPw').focus()}
/* --- Password settings --- */
function openPwSettings(){let h=getStoredHash();Q('pwOldField').style.display=h?'block':'none';Q('pwModalTitle').textContent=h?'修改密码':'设置密码';Q('pwHint').textContent=h?'留空新密码并保存可清除密码':'设置一个密码来保护你的书签';Q('pwOld').value='';Q('pwNew').value='';Q('pwConfirm').value='';Q('pwModal').classList.add('open')}
async function savePwSettings(){let h=getStoredHash();if(h){let o=Q('pwOld').value;if(!o)return alert('请输入当前密码');if((await hashPW(o))!==h)return alert('当前密码错误')}let n=Q('pwNew').value,c=Q('pwConfirm').value;if(n||c){if(n!==c)return alert('两次密码不一致');if(n.length<4)return alert('密码至少 4 位')}let nh=n?await hashPW(n):'';setStoredHash(nh);Q('pwModal').classList.remove('open');if(nh){alert('密码已'+(h?'修改':'设置'))}else{alert('密码已清除')}if(!nh&&!unlocked)unlocked=true;if(!nh){Q('lockScreen').classList.remove('open');Q('lockToggle').textContent='🔒';stopAutoLock();render()}else if(unlocked){startAutoLock()}}
function closePwSettings(){Q('pwModal').classList.remove('open')}
/* --- Data --- */
function ld(){try{B=JSON.parse(localStorage.getItem(SK))||[]}catch{B=[]}try{G=JSON.parse(localStorage.getItem(GK))||[]}catch{G=[]}if(!G.includes('默认'))G.unshift('默认')}
function sv(){localStorage.setItem(SK,JSON.stringify(B));localStorage.setItem(GK,JSON.stringify(G))}
function pt(s){return s.split('#').map(t=>t.trim()).filter(t=>t.length)}
function addB(){let t=Q('inputTitle').value.trim(),u=Q('inputUrl').value.trim(),g=Q('inputGroup').value,ts=pt(Q('inputTags').value),d=Q('inputDesc').value.trim();if(!t)return alert('请输入标题');if(!u)return alert('请输入 URL');if(!/^https?:\/\//i.test(u))u='https://'+u;if(g&&!G.includes(g))G.push(g);B.push({id:Date.now().toString(36)+Math.random().toString(36).slice(2,6),title:t,url:u,tags:ts,group:g,desc:d,createdAt:Date.now()});sv();Q('inputTitle').value='';Q('inputUrl').value='';Q('inputTags').value='';Q('inputDesc').value='';Q('inputTitle').focus();activeGroup=g||'__all__';r()}
function openEdit(id){let b=B.find(x=>x.id===id);if(!b)return;editingId=id;Q('editTitle').value=b.title;Q('editUrl').value=b.url;Q('editTags').value=b.tags.join(' #');Q('editDesc').value=b.desc||'';let eg=Q('editGroup');eg.innerHTML='';G.forEach(g=>{let o=document.createElement('option');o.value=g;o.textContent=g;if(g===b.group)o.selected=true;eg.appendChild(o)});Q('editModal').classList.add('open')}
function saveEdit(){let b=B.find(x=>x.id===editingId);if(!b)return;let t=Q('editTitle').value.trim(),u=Q('editUrl').value.trim(),g=Q('editGroup').value,ts=pt(Q('editTags').value),d=Q('editDesc').value.trim();if(!t)return alert('请输入标题');if(!u)return alert('请输入 URL');if(!/^https?:\/\//i.test(u))u='https://'+u;if(g&&!G.includes(g))G.push(g);Object.assign(b,{title:t,url:u,tags:ts,group:g,desc:d});sv();closeEdit();r()}
function closeEdit(){editingId=null;Q('editModal').classList.remove('open')}
function delB(id){if(!confirm('删除这个书签？'))return;B=B.filter(b=>b.id!==id);sv();r()}
function addG(){let n=prompt('输入分组名称：');if(!n||!n.trim())return;n=n.trim();if(G.includes(n))return alert('该分组已存在');G.push(n);sv();activeGroup=n;r()}
function renG(on){let n=prompt('输入新名称：',on);if(!n||!n.trim()||n.trim()===on)return;n=n.trim();if(G.includes(n))return alert('该名称已存在');let i=G.indexOf(on);if(i===-1)return;G[i]=n;B.forEach(b=>{if(b.group===on)b.group=n});sv();if(activeGroup===on)activeGroup=n;r()}
function delG(name){if(name==='默认')return alert('不能删除默认分组');let cnt=B.filter(b=>b.group===name).length;if(cnt>0&&!confirm('「'+name+'」中有 '+cnt+' 个书签，移动到「默认」并删除此分组？'))return;G=G.filter(g=>g!==name);B.forEach(b=>{if(b.group===name)b.group='默认'});sv();if(activeGroup===name)activeGroup='__all__';r()}
function allTags(){let m={};B.forEach(b=>b.tags.forEach(t=>m[t]=(m[t]||0)+1));return Object.entries(m).sort((a,b)=>b[1]-a[1])}
function filtered(){let l=B.slice();if(activeGroup!=='__all__')l=l.filter(b=>b.group===activeGroup);if(activeTag)l=l.filter(b=>b.tags.includes(activeTag));let q=searchText.trim().toLowerCase();if(q)l=l.filter(b=>b.title.toLowerCase().includes(q)||b.url.toLowerCase().includes(q)||(b.desc||'').toLowerCase().includes(q)||b.tags.some(t=>t.toLowerCase().includes(q)));l.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));return l}
function Q(i){return document.getElementById(i)}
function r(){let f=filtered(),ta=allTags();Q('totalCount').textContent=B.length
let gc=Q('groupList');gc.innerHTML='';function mkG(l,k,c,a){let d=document.createElement('div');d.className='group-item'+(a?' active':'');let ns=document.createElement('span');ns.className='gname';ns.textContent=l;let cs=document.createElement('span');cs.className='gcount';cs.textContent=c;d.appendChild(ns);d.appendChild(cs);d.addEventListener('click',()=>{activeGroup=k;if(k!=='__all__')activeTag=null;r()});return d}gc.appendChild(mkG('📂 全部书签','__all__',B.length,activeGroup==='__all__'));G.forEach(n=>{let cnt=B.filter(b=>b.group===n).length,it=mkG('📁 '+n,n,cnt,activeGroup===n);if(n!=='默认'){let a=document.createElement('span');a.className='group-actions';let rb=document.createElement('button');rb.textContent='✎';rb.title='重命名';rb.addEventListener('click',e=>{e.stopPropagation();renG(n)});let db=document.createElement('button');db.textContent='✕';db.title='删除分组';db.className='del-group';db.addEventListener('click',e=>{e.stopPropagation();delG(n)});a.appendChild(rb);a.appendChild(db);it.appendChild(a)}gc.appendChild(it)})
let tsb=Q('tagSidebarList');tsb.innerHTML='';if(ta.length===0){let e=document.createElement('div');e.style.cssText='padding:.35rem 1rem;font-size:.78rem;color:var(--text3)';e.textContent='暂无标签';tsb.appendChild(e)}else{ta.forEach(([n,c])=>{let d=document.createElement('div');d.className='tag-sb-item'+(n===activeTag?' active':'');let ns=document.createElement('span');ns.textContent='# '+n;let cs=document.createElement('span');cs.className='tcount';cs.textContent=c;d.appendChild(ns);d.appendChild(cs);d.addEventListener('click',()=>{activeTag=activeTag===n?null:n;r()});tsb.appendChild(d)})}
let tc=Q('tagFilterGroup');tc.innerHTML='';ta.forEach(([n,c])=>{let ch=document.createElement('span');ch.className='tag-chip'+(n===activeTag?' active':'');ch.textContent='#'+n+' '+c;ch.addEventListener('click',()=>{activeTag=activeTag===n?null:n;r()});tc.appendChild(ch)})
let sel=Q('inputGroup');sel.innerHTML='';let eo=document.createElement('option');eo.value='';eo.textContent='（无分组）';sel.appendChild(eo);G.forEach(g=>{let o=document.createElement('option');o.value=g;o.textContent=g;sel.appendChild(o)});if(activeGroup!=='__all__')sel.value=activeGroup
let ct=Q('bookmarkList');if(f.length===0){ct.innerHTML='<div class="empty-state">'+(B.length===0?'还没有书签 🎯':'没有匹配的书签')+'</div>';return}ct.innerHTML='';f.forEach(b=>{let it=document.createElement('div');it.className='bookmark-item';let ic=document.createElement('div');ic.className='bookmark-icon';let im=document.createElement('img');let host;try{host=new URL(b.url).hostname}catch{host=''}im.src=host?'https://www.google.com/s2/favicons?domain='+encodeURIComponent(host)+'&sz=32':'';im.alt='';im.onerror=()=>{ic.innerHTML='🔖'};ic.appendChild(im);let bd=document.createElement('div');bd.className='bookmark-body';let lk=document.createElement('a');lk.className='bookmark-title';lk.href=b.url;lk.target='_blank';lk.rel='noopener noreferrer';lk.textContent=b.title;let ul=document.createElement('div');ul.className='bookmark-url';ul.textContent=b.url+(b.group?' · '+b.group:'');let dd=document.createElement('div');dd.className='bookmark-desc';if(b.desc)dd.textContent=b.desc;let tw=document.createElement('div');tw.className='bookmark-tags';b.tags.forEach(t=>{let tg=document.createElement('span');tg.className='bookmark-tag';tg.textContent='#'+t;tg.addEventListener('click',()=>{activeTag=t;r()});tw.appendChild(tg)});bd.appendChild(lk);bd.appendChild(ul);if(b.desc)bd.appendChild(dd);bd.appendChild(tw);let ac=document.createElement('div');ac.className='bookmark-actions';let eb=document.createElement('button');eb.className='btn btn-ghost';eb.textContent='✎';eb.title='编辑';eb.addEventListener('click',()=>openEdit(b.id));ac.appendChild(eb);let db=document.createElement('button');db.className='btn btn-danger';db.textContent='✕';db.title='删除';db.addEventListener('click',()=>delB(b.id));ac.appendChild(db);it.appendChild(ic);it.appendChild(bd);it.appendChild(ac);ct.appendChild(it)})}
/* --- Init --- */
loadTheme();ld();initLock().then(()=>{if(unlocked)r()});async function handleUnlock(){let pw=Q('lockPw').value;if(!pw)return;let ok=await tryUnlock(pw);if(!ok){Q('lockError').textContent='密码错误';Q('lockPw').value='';Q('lockPw').focus()}else{r()}}
Q('lockUnlock').addEventListener('click',handleUnlock);Q('lockPw').addEventListener('keydown',e=>{if(e.key==='Enter')handleUnlock()});Q('lockShowSet').addEventListener('click',()=>{openPwSettings();Q('lockScreen').classList.remove('open')})
Q('lockToggle').addEventListener('click',()=>{let h=getStoredHash();if(!h){openPwSettings()}else{lock()}})
Q('settingsBtn').addEventListener('click',openSettings);Q('settingsClose').addEventListener('click',closeSettings);Q('settingsModal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeSettings()});document.querySelectorAll('#themeOptions .set-opt').forEach(el=>el.addEventListener('click',()=>setTheme(el.dataset.val)));document.querySelectorAll('#fsOptions .set-opt').forEach(el=>el.addEventListener('click',()=>setFontSize(el.dataset.val)))
Q('btnAdd').addEventListener('click',addB);Q('inputTitle').addEventListener('keydown',e=>{if(e.key==='Enter')Q('inputUrl').focus()});Q('inputUrl').addEventListener('keydown',e=>{if(e.key==='Enter')Q('inputTags').focus()});Q('inputTags').addEventListener('keydown',e=>{if(e.key==='Enter')addB()});Q('addGroupBtn').addEventListener('click',addG);Q('editSave').addEventListener('click',saveEdit);Q('editCancel').addEventListener('click',closeEdit);Q('editModal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeEdit()});Q('editTitle').addEventListener('keydown',e=>{if(e.key==='Enter')Q('editUrl').focus()});Q('editUrl').addEventListener('keydown',e=>{if(e.key==='Enter')Q('editDesc').focus()});Q('editDesc').addEventListener('keydown',e=>{if(e.key==='Enter')saveEdit()});document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeEdit();closePwSettings();closeSettings()}});Q('searchInput').addEventListener('input',e=>{searchText=e.target.value;r()});Q('clearFilter').addEventListener('click',()=>{activeTag=null;Q('searchInput').value='';searchText='';r()})
Q('pwSave').addEventListener('click',savePwSettings);Q('pwCancel').addEventListener('click',closePwSettings);Q('pwModal').addEventListener('click',e=>{if(e.target===e.currentTarget)closePwSettings()});Q('pwNew').addEventListener('keydown',e=>{if(e.key==='Enter')Q('pwConfirm').focus()});Q('pwConfirm').addEventListener('keydown',e=>{if(e.key==='Enter')savePwSettings()});
['mousedown','keydown','touchstart','scroll','wheel'].forEach(ev=>document.addEventListener(ev,resetActivity,{passive:true}));
</script>
</body>
</html>
